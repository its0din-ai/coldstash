services:
  coldstash:
    build:
      context: .
      dockerfile: Dockerfile

    image: coldstash:latest
    container_name: coldstash

    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      DB_PATH: /app/data/coldstash.db
      LOG_DIR: /app/logs

    volumes:
      - coldstash_data:/app/data
      - coldstash_logs:/app/logs
      - coldstash_next:/app/.next

    # Root inside container, but capabilities are stripped to near-zero.
    # The process can read/write its own files and open a port — nothing else.
    user: "0:0"

    tmpfs:
      - /tmp:size=64m,mode=1777

    # Keep only what Node.js actually needs:
    #   NET_BIND_SERVICE — bind to port 3000 (needed if port < 1024; harmless above)
    # Everything else dropped.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    # Now safe to set since we're not using gosu
    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          cpus:   "1.0"
          memory: 512M
        reservations:
          cpus:   "0.25"
          memory: 128M

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  coldstash_data:
    driver: local
  coldstash_logs:
    driver: local
  coldstash_next:
    driver: local